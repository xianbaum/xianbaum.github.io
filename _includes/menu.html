<!-- Menu toggle buttons -->
<input type="radio"
       class="menu-toggle open"
       name="menu-toggle"
       aria-label="Open menu"
       id="ta_menuOpen">
<input type="radio"
       class="menu-toggle close"
       name="menu-toggle"
       aria-label="Close menu"
			 id="ta_menuClose">
<label class="menu-toggle overlay hidden"
			 for="ta_menuClose"
			 tabindex="-1"
       aria-hidden="true"></label>

<div class="hamburger semisticky" id="ta_hamburger" hx-preserve="true" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Theme toggle buttons -->
<input type="radio"
       class="theme-toggle on semisticky"
       name="theme-toggle"
       aria-label="Enable dark theme"
       id="theme-toggle-on"
       hx-preserve="true">
<input type="radio"
       class="theme-toggle off semisticky"
       name="theme-toggle"
       aria-label="Enable light theme"
       id="theme-toggle-off"
       checked
       hx-preserve="true">

<div class="theme-toggle-icon-outer semisticky" aria-hidden="true">
  <div class="theme-toggle-icon-inner semisticky"></div>
</div>

<div class="margin-1-icon straykittyicon-container semisticky">
  <button class="straykittyicon" id="straykitty" aria-hidden="true" hx-preserve="true" tabindex="-1"></button>
</div>
